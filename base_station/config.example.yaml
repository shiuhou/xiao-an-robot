server:
  host: "0.0.0.0"
  control_port: 8765

paths:
  model_dir: "models"
  database: "../agent/data/xiao_an.db"
  log_dir: "../logs"
  tts_dir: "../logs/tts"

perception:
  enable_openvino: true
  enable_audio: true
  enable_video: true

robot:
  heartbeat_timeout_sec: 30

device:
  npu_device: "NPU"
  cpu_device: "CPU"

models:
  face_emotion: "models/emotions-recognition-retail-0003.xml"
  head_pose: "models/head-pose-estimation-adas-0001.xml"
  asr_model: "models/sherpa-onnx-streaming-zipformer-zh"
  vad_model: "models/silero_vad.onnx"

thresholds:
  fatigue_score: 0.7
  anxiety_score: 0.65
  trigger_duration_min: 30

http_server:
  port: 8080
