    +<ws_client.cpp>
    +<motor_ctrl.cpp>
    +<cam_stream.cpp>
    +<mic_stream.cpp>
    +<peripherals/speaker.cpp>
    +<peripherals/face240_display.cpp>
    -<main.cpp>
    -<display.cpp>
    -<servo_ctrl.cpp>
