[env:display_test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters =
    time
upload_speed = 460800
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.flash_mode = qio
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7735_DRIVER
    -DST7735_GREENTAB
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DTFT_MOSI=11
    -DTFT_MISO=-1
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=9
    -DTFT_RST=14
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DSPI_FREQUENCY=10000000
build_src_filter =
    -<*>
    +<tft_test.cpp>

[env:tfttest]
extends = env:display_test

