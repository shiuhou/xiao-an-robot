[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.43
    espressif/esp32-camera@^2.0.0
upload_speed = 921600
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.flash_mode = qio
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SUPPORT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -mfix-esp32-psram-cache-issue
build_src_filter =
    +<*>
    -<camtesting_program.cpp>
    -<keep_face_center_test.cpp>
    -<motor_bench_once_main.cpp>
    -<motor_manual_main.cpp>
    -<red_circle_tracker_test.cpp>
    -<serial_red_tracker_test.cpp>
    -<serial_qr_servo_main.cpp>
    -<tft_test.cpp>
    -<voice_recognition_test.cpp>
    -<speaker_amp_test.cpp>

