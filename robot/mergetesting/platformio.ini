; Diagnostic only: move MAX98357A off GPIO35/36/37 to test the
; suspected ESP32-S3 Octal flash/PSRAM pin conflict. This conflicts with
; the default INMP441 mic pins, so keep it speaker-only.
[env:mergetesting_speaker_altpins_only]
extends = env:mergetesting_speaker_only
