; robot/mergetesting — 明日 DK-2500 联调固件（独立 PlatformIO 工程）
;
; 烧录前请修改 src/config.h 中的 WiFi 与基站 IP。
; 构建: pio run -d robot/mergetesting
; 上传: pio run -d robot/mergetesting -t upload
; 监视: pio device monitor -d robot/mergetesting

[platformio]
default_envs = mergetesting

[env:mergetesting]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.flash_mode = qio

lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.43
    espressif/esp32-camera@^2.0.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SUPPORT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -mfix-esp32-psram-cache-issue
    -DARDUINOJSON_USE_LONG_LONG=1
    ; 2.4" ST7789 integrated harness (hardware/wiring/esp32_pinout.md)
    -DUSER_SETUP_LOADED
    -DST7789_2_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_SCLK=14
    -DTFT_MOSI=21
    -DTFT_MISO=-1
    -DTFT_CS=42
    -DTFT_DC=43
    -DTFT_RST=44
    -DTFT_BL=48
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DSPI_FREQUENCY=10000000

build_src_filter =
    +<*>
    -<.gitkeep>
    -<face240_display.cpp>

[env:mergetesting_display_only]
extends = env:mergetesting
build_flags =
    ${env:mergetesting.build_flags}
    -DMERGETEST_ENABLE_DISPLAY=1
    -DMERGETEST_ENABLE_CAMERA=0
build_src_filter =
    +<*>
    -<face240_display.cpp>

[env:mergetesting_face240_only]
extends = env:mergetesting
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SUPPORT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -mfix-esp32-psram-cache-issue
    -DARDUINOJSON_USE_LONG_LONG=1
    -DMERGETEST_ENABLE_DISPLAY=1
    -DMERGETEST_DISPLAY_FACE240=1
    -DMERGETEST_ENABLE_CAMERA=0
    -DMERGETEST_ENABLE_MOTOR=1
    -DMERGETEST_ENABLE_SPEAKER=1
    -DMERGETEST_ENABLE_MIC=0
build_src_filter =
    +<*>

[env:mergetesting_cam_only]
extends = env:mergetesting
build_flags =
    ${env:mergetesting.build_flags}
    -DMERGETEST_ENABLE_DISPLAY=0
    -DMERGETEST_ENABLE_CAMERA=1
build_src_filter =
    +<*>
    -<face240_display.cpp>

[env:mergetesting_mic_only]
extends = env:mergetesting_display_only
build_flags =
    ${env:mergetesting_display_only.build_flags}
    -DMERGETEST_ENABLE_MIC=1

[env:mergetesting_base64_video]
extends = env:mergetesting
build_flags =
    ${env:mergetesting.build_flags}
    -DMERGETEST_VIDEO_BASE64_FALLBACK=1
